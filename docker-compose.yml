version: '3.8'

services:
  backend:
    build: ./server
    container_name: dbgame-backend
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: always

  frontend:
    build: ./client
    container_name: dbgame-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
